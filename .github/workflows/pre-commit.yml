name: pre-commit

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
    - run: npm ci
    - uses: pre-commit/action@v3.0.1
      with:
        extra_args: --files src/ .pre-commit-config.yaml .github/ package.json vite.config.ts tsconfig.json
